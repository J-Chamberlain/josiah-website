<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Word Vectors</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #241d17;
      --muted: #6c5b4d;
      --rule: rgba(58, 45, 34, 0.26);
      --accent: #b15f2c;
      --accent-2: #385f78;
      --paper: #f4ead8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }

    .plate {
      width: min(100%, 900px);
      min-height: 560px;
      margin: 0 auto;
      padding: clamp(22px, 4vw, 42px);
      background:
        radial-gradient(circle at 22% 18%, rgba(255, 255, 255, 0.52), transparent 24%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.45), transparent 46%),
        var(--paper);
      border: 1px solid var(--rule);
      position: relative;
      overflow: hidden;
    }

    .plate::before {
      content: "";
      position: absolute;
      inset: 16px;
      border: 1px solid rgba(58, 45, 34, 0.16);
      pointer-events: none;
    }

    header {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    h1 {
      margin: 0;
      font-family: "Courier New", monospace;
      font-size: clamp(1.55rem, 4vw, 2.45rem);
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .subtitle {
      margin: 0.55rem auto 0;
      max-width: 34rem;
      color: var(--muted);
      font-size: clamp(0.95rem, 2vw, 1.12rem);
    }

    .diagram {
      width: min(100%, 680px);
      aspect-ratio: 1.35;
      margin: clamp(22px, 4vw, 34px) auto 0;
      position: relative;
      z-index: 1;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    .axis {
      stroke: rgba(36, 29, 23, 0.64);
      stroke-width: 1.5;
      marker-end: url("#arrow");
    }

    .grid {
      stroke: rgba(36, 29, 23, 0.12);
      stroke-width: 1;
    }

    .vector-power {
      stroke: var(--accent-2);
      stroke-width: 4;
      marker-end: url("#arrow-blue");
    }

    .vector-gender {
      stroke: var(--accent);
      stroke-width: 4;
      marker-end: url("#arrow-orange");
    }

    .guide {
      stroke: rgba(36, 29, 23, 0.22);
      stroke-dasharray: 6 6;
      stroke-width: 1.4;
    }

    .point {
      fill: var(--ink);
    }

    text {
      fill: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 18px;
    }

    .axis-label {
      fill: var(--muted);
      font-family: "Courier New", monospace;
      font-size: 15px;
    }

    .word {
      font-weight: 700;
    }

    .note {
      max-width: 39rem;
      margin: clamp(18px, 3vw, 28px) auto 0;
      color: var(--muted);
      font-size: clamp(0.98rem, 2vw, 1.1rem);
      line-height: 1.55;
      text-align: center;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <main class="plate" aria-label="Word vector illustration">
    <header>
      <h1>WORD VECTORS</h1>
      <p class="subtitle">Relationships between concepts as directions in space</p>
    </header>

    <div class="diagram" aria-hidden="true">
      <svg viewBox="0 0 680 500" role="img">
        <defs>
          <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L8,3 z" fill="rgba(36, 29, 23, 0.64)" />
          </marker>
          <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L8,3 z" fill="#385f78" />
          </marker>
          <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L8,3 z" fill="#b15f2c" />
          </marker>
        </defs>

        <path class="grid" d="M120 420H575M120 340H575M120 260H575M120 180H575M120 100H575M200 70V420M300 70V420M400 70V420M500 70V420" />
        <path class="axis" d="M120 420H595" />
        <path class="axis" d="M120 420V62" />

        <text x="98" y="442">O</text>
        <text class="axis-label" x="480" y="460">masculine</text>
        <text class="axis-label" x="128" y="460">feminine</text>
        <text class="axis-label" x="66" y="110" transform="rotate(-90 66 110)">monarch</text>
        <text class="axis-label" x="66" y="392" transform="rotate(-90 66 392)">slave</text>
        <text class="axis-label" x="98" y="48">power</text>

        <line class="guide" x1="210" y1="350" x2="210" y2="150" />
        <line class="guide" x1="210" y1="150" x2="450" y2="150" />
        <line class="vector-power" x1="210" y1="350" x2="210" y2="160" />
        <line class="vector-gender" x1="210" y1="150" x2="440" y2="150" />

        <circle class="point" cx="210" cy="350" r="5" />
        <circle class="point" cx="210" cy="150" r="5" />
        <circle class="point" cx="450" cy="150" r="5" />
        <circle class="point" cx="450" cy="350" r="5" />

        <text class="word" x="165" y="382">woman</text>
        <text class="word" x="154" y="132">queen</text>
        <text class="word" x="468" y="132">king</text>
        <text class="word" x="466" y="382">queen</text>
      </svg>
    </div>

    <p class="note">The queen vector is the sum of two components: a move up the power axis, then a move along the gender axis. Each direction is independent — and navigable.</p>
  </main>
</body>
</html>
